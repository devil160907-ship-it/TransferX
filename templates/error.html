{% extends "base.html" %}
{% block title %}Error - TransferX{% endblock %}

{% block content %}
<div class="error-container">
    <div class="glass-card error-card" data-aos="fade-up">
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle"></i>
        </div>
        <h1 class="error-code">{{ error_code }}</h1>
        <h2 class="error-message">{{ error_message }}</h2>
        <p class="error-description">{{ error_description }}</p>
        <div class="error-actions">
            <a href="{{ url_for('routes.home') }}" class="btn-primary">
                <i class="bi bi-house"></i> Go Home
            </a>
            <button onclick="history.back()" class="btn-secondary">
                <i class="bi bi-arrow-left"></i> Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
