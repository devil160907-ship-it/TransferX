<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Draft - TransferX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4F8CFF;
            --primary-dark: #3A7BD5;
            --primary-light: #7BABFF;
            --secondary: #6C63FF;
            --gradient-start: #4F8CFF;
            --gradient-end: #6C63FF;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(79, 140, 255, 0.15);
            --text-primary: #1A2332;
            --text-secondary: #4A5568;
            --text-light: #A0AEC0;
            --bg-primary: #F0F7FF;
            --bg-secondary: #E8F0FE;
            --success: #48BB78;
            --error: #FC8181;
            --warning: #F6AD55;
            --info: #63B3ED;
            --border-radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --nav-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #F0F7FF 0%, #E8F0FE 100%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        body.menu-open {
            overflow: hidden;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--glass-shadow);
            min-height: var(--nav-height);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            z-index: 1001;
        }

        .nav-brand i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hamburger-menu {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 22px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1001;
            transition: var(--transition);
        }

        .hamburger-menu .hamburger-line {
            display: block;
            width: 100%;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: var(--transition);
            transform-origin: center;
        }

        .hamburger-menu.active .hamburger-line:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }

        .hamburger-menu.active .hamburger-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .hamburger-menu.active .hamburger-line:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        .hamburger-menu:hover .hamburger-line {
            background: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            transition: var(--transition);
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            transition: var(--transition);
            transform: translateX(-50%);
            border-radius: 1px;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 60%;
        }

        .nav-link:hover {
            background: var(--glass-bg);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: var(--glass-bg);
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(79, 140, 255, 0.2);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            transition: var(--transition);
        }

        .theme-toggle {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: white;
            transform: rotate(30deg);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 140, 255, 0.3);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(252, 129, 129, 0.3);
        }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(72, 187, 120, 0.3);
        }

        .btn-warning {
            background: var(--warning);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(246, 173, 85, 0.3);
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(79, 140, 255, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group label i {
            margin-right: 0.5rem;
        }

        .form-group label .required {
            color: var(--error);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            color: var(--text-primary);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.1);
        }

        .form-group input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 200px;
        }

        .editor-toolbar {
            display: flex;
            gap: 0.25rem;
            padding: 0.5rem;
            background: var(--glass-bg);
            border-radius: 12px 12px 0 0;
            border: 2px solid var(--glass-border);
            border-bottom: none;
            flex-wrap: wrap;
        }

        .editor-toolbar button {
            background: none;
            border: none;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .editor-toolbar button:hover {
            background: var(--glass-bg);
            color: var(--primary);
        }

        .editor-toolbar .divider {
            color: var(--text-light);
            padding: 0 0.25rem;
        }

        .draft-details-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .draft-details-card {
            padding: 2rem;
        }

        .draft-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .draft-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-primary);
        }

        .draft-header h2 i {
            color: var(--warning);
        }

        .draft-actions-top {
            display: flex;
            gap: 0.5rem;
        }

        .draft-actions-top .btn-secondary {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .draft-info {
            background: var(--glass-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .draft-info i {
            margin-right: 0.25rem;
        }

        .draft-info span {
            display: flex;
            align-items: center;
        }

        .draft-actions-bottom {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .draft-actions-bottom button {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            border: none;
        }

        .draft-actions-bottom .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
        }

        .draft-actions-bottom .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 140, 255, 0.3);
        }

        .draft-actions-bottom .btn-success {
            background: var(--success);
            color: white;
        }

        .draft-actions-bottom .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(72, 187, 120, 0.3);
        }

        .draft-actions-bottom .btn-danger {
            background: var(--error);
            color: white;
        }

        .draft-actions-bottom .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(252, 129, 129, 0.3);
        }

        .draft-actions-bottom .btn-secondary {
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .draft-actions-bottom .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .notification-toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 9999;
            animation: slideInRight 0.3s ease;
            min-width: 300px;
        }

        .notification-toast.success {
            border-left: 4px solid var(--success);
        }

        .notification-toast.error {
            border-left: 4px solid var(--error);
        }

        .notification-toast.warning {
            border-left: 4px solid var(--warning);
        }

        .notification-toast.info {
            border-left: 4px solid var(--info);
        }

        .notification-toast i {
            font-size: 1.5rem;
        }

        .notification-toast.success i {
            color: var(--success);
        }

        .notification-toast.error i {
            color: var(--error);
        }

        .notification-toast.warning i {
            color: var(--warning);
        }

        .notification-toast.info i {
            color: var(--info);
        }

        .dismiss-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            padding: 0 0.5rem;
        }

        .dismiss-btn:hover {
            color: var(--text-primary);
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--primary);
            animation: progress 5s linear forwards;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes progress {
            from {
                width: 100%;
            }
            to {
                width: 0%;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 992px) {
            .hamburger-menu {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 80%;
                max-width: 350px;
                height: 100vh;
                background: var(--glass-bg);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 1.5rem;
                padding: 2rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                border-left: 1px solid var(--glass-border);
                box-shadow: -8px 0 32px rgba(0, 0, 0, 0.1);
                z-index: 999;
                overflow-y: auto;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links .nav-link {
                font-size: 1.2rem;
                padding: 0.75rem 1.5rem;
                width: 100%;
                justify-content: center;
                border-radius: 12px;
            }

            .nav-links .nav-link::after {
                display: none;
            }

            .nav-links .nav-link:hover,
            .nav-links .nav-link.active {
                background: var(--glass-bg);
                transform: translateX(5px);
            }

            .nav-actions {
                position: fixed;
                bottom: 2rem;
                right: -100%;
                gap: 1.5rem;
                transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.1s;
                z-index: 999;
                padding: 1rem 2rem;
                background: var(--glass-bg);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                border-radius: 16px;
                border: 1px solid var(--glass-border);
                box-shadow: var(--glass-shadow);
            }

            .nav-actions.active {
                right: 50%;
                transform: translateX(50%);
            }

            .nav-actions .nav-link {
                font-size: 1.1rem;
                padding: 0.5rem 0.75rem;
            }

            .nav-actions .nav-link span {
                display: none;
            }

            .nav-actions .theme-toggle {
                width: 44px;
                height: 44px;
            }

            .nav-links.active::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.3);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                z-index: -1;
                animation: fadeIn 0.3s ease;
            }
        }

        @media (max-width: 768px) {
            .glass-nav {
                padding: 0.75rem 1rem;
            }

            .main-content {
                padding: 1rem;
            }

            .glass-card {
                padding: 1.5rem;
            }

            .draft-details-card {
                padding: 1rem;
            }

            .draft-header {
                flex-direction: column;
                align-items: stretch;
            }

            .draft-actions-top {
                justify-content: flex-start;
            }

            .draft-actions-bottom {
                flex-direction: column;
            }

            .draft-actions-bottom button {
                width: 100%;
                justify-content: center;
            }

            .draft-info {
                flex-direction: column;
                gap: 0.5rem;
            }

            .editor-toolbar {
                gap: 0.1rem;
            }

            .editor-toolbar button {
                padding: 0.3rem 0.5rem;
                font-size: 0.9rem;
            }

            .notification-toast {
                min-width: auto;
                max-width: 90%;
                right: 5%;
                left: 5%;
            }
        }

        @media (max-width: 480px) {
            .draft-header h2 {
                font-size: 1.2rem;
            }

            .draft-actions-top .btn-secondary {
                font-size: 0.8rem;
                padding: 0.4rem 0.75rem;
            }

            .glass-nav {
                padding: 0.75rem 1rem;
            }

            .nav-brand {
                font-size: 1.2rem;
            }

            .nav-brand i {
                font-size: 1.6rem;
            }

            .nav-links {
                width: 100%;
                max-width: 100%;
                border-radius: 0;
            }

            .nav-actions {
                bottom: 1.5rem;
                padding: 0.75rem 1.5rem;
                gap: 1rem;
            }

            .nav-actions .nav-link {
                font-size: 1rem;
            }
        }

        @media (min-width: 993px) {
            .hamburger-menu {
                display: none !important;
            }

            .nav-links {
                display: flex !important;
                position: static !important;
                width: auto !important;
                height: auto !important;
                background: none !important;
                backdrop-filter: none !important;
                flex-direction: row !important;
                padding: 0 !important;
                border-left: none !important;
                box-shadow: none !important;
                transform: none !important;
                overflow: visible !important;
            }

            .nav-links.active {
                right: auto !important;
            }

            .nav-actions {
                position: static !important;
                transform: none !important;
                background: none !important;
                backdrop-filter: none !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                bottom: auto !important;
                right: auto !important;
            }

            .nav-actions.active {
                right: auto !important;
                transform: none !important;
            }

            .nav-links.active::before {
                display: none !important;
            }

            body.menu-open {
                overflow: auto !important;
            }
        }

        [data-theme="dark"] {
            --bg-primary: #0f1724;
            --bg-secondary: #1a2332;
            --text-primary: #e8f0fe;
            --text-secondary: #a0aec0;
            --text-light: #718096;
            --glass-bg: rgba(26, 35, 50, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0f1724 0%, #1a2332 100%);
        }

        [data-theme="dark"] .glass-nav {
            background: rgba(26, 35, 50, 0.8);
        }

        [data-theme="dark"] .nav-link {
            color: var(--text-secondary);
        }

        [data-theme="dark"] .nav-link.active {
            background: rgba(79, 140, 255, 0.15);
            color: var(--primary);
        }

        [data-theme="dark"] .form-group input,
        [data-theme="dark"] .form-group textarea,
        [data-theme="dark"] .form-group select {
            background: rgba(26, 35, 50, 0.5);
            color: var(--text-primary);
        }

        [data-theme="dark"] .glass-card {
            background: rgba(26, 35, 50, 0.5);
        }

        [data-theme="dark"] .btn-secondary {
            background: rgba(26, 35, 50, 0.5);
            color: var(--text-primary);
        }

        [data-theme="dark"] .notification-toast {
            background: rgba(26, 35, 50, 0.9);
        }

        [data-theme="dark"] .hamburger-menu .hamburger-line {
            background: var(--text-primary);
        }

        [data-theme="dark"] .nav-links {
            background: rgba(26, 35, 50, 0.9);
        }

        [data-theme="dark"] .nav-actions {
            background: rgba(26, 35, 50, 0.9);
        }

        [data-aos] {
            pointer-events: none;
        }

        [data-aos].aos-animate {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="glass-nav">
            <a href="{{ url_for('routes.dashboard') }}" class="nav-brand">
                <i class="bi bi-cloud-arrow-up-fill"></i>
                <span>TransferX</span>
            </a>
            
            <button class="hamburger-menu" id="hamburgerMenu" aria-label="Toggle navigation">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            
            <div class="nav-links" id="navLinks">
                <a href="{{ url_for('routes.dashboard') }}" class="nav-link">
                    <i class="bi bi-grid"></i> Dashboard
                </a>
                <a href="{{ url_for('routes.compose') }}" class="nav-link">
                    <i class="bi bi-pencil-square"></i> Compose
                </a>
                <a href="{{ url_for('routes.sent') }}" class="nav-link">
                    <i class="bi bi-send"></i> Sent
                </a>
                <a href="{{ url_for('routes.drafts') }}" class="nav-link active">
                    <i class="bi bi-pencil"></i> Drafts
                </a>
            </div>
            
            <div class="nav-actions" id="navActions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="bi bi-moon"></i>
                </button>
                <a href="{{ url_for('routes.profile') }}" class="nav-link">
                    <i class="bi bi-person-circle"></i>
                </a>
                <a href="{{ url_for('auth.logout') }}" class="nav-link">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
        </nav>
        
        <main class="main-content">
            <div class="draft-details-container">
                <div class="glass-card draft-details-card" data-aos="fade-up">
                    <div class="draft-header">
                        <h2>
                            <i class="bi bi-pencil-square"></i>
                            Edit Draft
                        </h2>
                        <div class="draft-actions-top">
                            <a href="{{ url_for('routes.drafts') }}" class="btn-secondary">
                                <i class="bi bi-arrow-left"></i> Back to Drafts
                            </a>
                        </div>
                    </div>

                    <div class="draft-info">
                        <span><i class="bi bi-clock-history"></i> Created: {{ draft.created_at.strftime('%B %d, %Y at %H:%M') }}</span>
                        <span><i class="bi bi-pencil"></i> Last Modified: {{ draft.updated_at.strftime('%B %d, %Y at %H:%M') }}</span>
                    </div>

                    <form method="POST" action="{{ url_for('routes.draft_details', draft_id=draft.id) }}" id="draftForm">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="action" id="formAction" value="edit">

                        <div class="form-group">
                            <label for="recipient"><i class="bi bi-envelope"></i> To <span class="required">*</span></label>
                            <input type="text" id="recipient" name="recipient" required
                                   value="{{ draft.recipient or '' }}"
                                   placeholder="Enter recipient email(s), separated by commas">
                        </div>

                        <div class="form-group">
                            <label for="cc"><i class="bi bi-envelope-plus"></i> CC</label>
                            <input type="text" id="cc" name="cc" 
                                   value="{{ draft.cc or '' }}"
                                   placeholder="CC recipients (separated by commas)">
                        </div>

                        <div class="form-group">
                            <label for="bcc"><i class="bi bi-envelope-slash"></i> BCC</label>
                            <input type="text" id="bcc" name="bcc" 
                                   value="{{ draft.bcc or '' }}"
                                   placeholder="BCC recipients (separated by commas)">
                        </div>

                        <div class="form-group">
                            <label for="subject"><i class="bi bi-tag"></i> Subject <span class="required">*</span></label>
                            <input type="text" id="subject" name="subject" required
                                   value="{{ draft.subject or '' }}"
                                   placeholder="Email subject">
                        </div>

                        <div class="form-group">
                            <label><i class="bi bi-chat"></i> Message <span class="required">*</span></label>
                            <div class="editor-toolbar">
                                <button type="button" data-command="bold" title="Bold"><i class="bi bi-type-bold"></i></button>
                                <button type="button" data-command="italic" title="Italic"><i class="bi bi-type-italic"></i></button>
                                <button type="button" data-command="underline" title="Underline"><i class="bi bi-type-underline"></i></button>
                                <button type="button" data-command="strike" title="Strikethrough"><i class="bi bi-type-strikethrough"></i></button>
                                <span class="divider">|</span>
                                <button type="button" data-command="justifyLeft" title="Align Left"><i class="bi bi-text-left"></i></button>
                                <button type="button" data-command="justifyCenter" title="Center"><i class="bi bi-text-center"></i></button>
                                <button type="button" data-command="justifyRight" title="Align Right"><i class="bi bi-text-right"></i></button>
                                <span class="divider">|</span>
                                <button type="button" data-command="insertUnorderedList" title="Bullet List"><i class="bi bi-list-ul"></i></button>
                                <button type="button" data-command="insertOrderedList" title="Numbered List"><i class="bi bi-list-ol"></i></button>
                            </div>
                            <textarea id="body" name="body" rows="12" 
                                      placeholder="Write your message here..." required>{{ draft.body or '' }}</textarea>
                        </div>

                        <div class="draft-actions-bottom">
                            <button type="submit" name="action" value="edit" class="btn-primary">
                                <i class="bi bi-save"></i> Update Draft
                            </button>
                            <button type="submit" name="action" value="send" class="btn-success">
                                <i class="bi bi-send"></i> Send Email
                            </button>
                            <button type="submit" name="action" value="delete" class="btn-danger" 
                                    onclick="return confirm('Are you sure you want to delete this draft?')">
                                <i class="bi bi-trash"></i> Delete Draft
                            </button>
                            <a href="{{ url_for('routes.drafts') }}" class="btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true,
            offset: 50
        });

        // Theme Toggle
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                const currentTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', currentTheme);
                updateThemeIcon(toggle, currentTheme);
                
                toggle.addEventListener('click', function() {
                    const current = document.documentElement.getAttribute('data-theme');
                    const next = current === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('theme', next);
                    updateThemeIcon(this, next);
                });
            }

            function updateThemeIcon(button, theme) {
                const icon = button.querySelector('i');
                if (theme === 'dark') {
                    icon.className = 'bi bi-sun';
                } else {
                    icon.className = 'bi bi-moon';
                }
            }

            // Hamburger Menu
            const hamburger = document.getElementById('hamburgerMenu');
            const navLinks = document.getElementById('navLinks');
            const navActions = document.getElementById('navActions');
            
            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function() {
                    this.classList.toggle('active');
                    navLinks.classList.toggle('active');
                    if (navActions) {
                        navActions.classList.toggle('active');
                    }
                    document.body.classList.toggle('menu-open');
                });
            }

            // Editor Toolbar
            const toolbar = document.querySelector('.editor-toolbar');
            const textarea = document.getElementById('body');
            
            if (toolbar && textarea) {
                toolbar.querySelectorAll('button').forEach(button => {
                    button.addEventListener('click', function(e) {
                        e.preventDefault();
                        const command = this.dataset.command;
                        if (!command) return;
                        
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        const text = textarea.value;
                        let newText = text;
                        let cursorOffset = 0;
                        
                        switch(command) {
                            case 'bold':
                                newText = text.substring(0, start) + '**' + text.substring(start, end) + '**' + text.substring(end);
                                cursorOffset = 2;
                                break;
                            case 'italic':
                                newText = text.substring(0, start) + '*' + text.substring(start, end) + '*' + text.substring(end);
                                cursorOffset = 1;
                                break;
                            case 'underline':
                                newText = text.substring(0, start) + '__' + text.substring(start, end) + '__' + text.substring(end);
                                cursorOffset = 2;
                                break;
                            case 'strike':
                                newText = text.substring(0, start) + '~~' + text.substring(start, end) + '~~' + text.substring(end);
                                cursorOffset = 2;
                                break;
                            case 'insertUnorderedList':
                                const lines = text.substring(start, end).split('\n');
                                const bulletLines = lines.map(line => '- ' + line).join('\n');
                                newText = text.substring(0, start) + bulletLines + text.substring(end);
                                cursorOffset = 2;
                                break;
                            case 'insertOrderedList':
                                const oLines = text.substring(start, end).split('\n');
                                const numLines = oLines.map((line, i) => (i + 1) + '. ' + line).join('\n');
                                newText = text.substring(0, start) + numLines + text.substring(end);
                                cursorOffset = 3;
                                break;
                            default:
                                return;
                        }
                        
                        textarea.value = newText;
                        const newCursor = start + cursorOffset;
                        textarea.setSelectionRange(newCursor, newCursor);
                        textarea.focus();
                    });
                });
            }

            // Form Validation
            const form = document.getElementById('draftForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    const action = this.querySelector('[name="action"]:focus');
                    if (action && action.value === 'delete') {
                        if (!confirm('Are you sure you want to delete this draft? This action cannot be undone.')) {
                            e.preventDefault();
                            return;
                        }
                    }
                    
                    if (action && (action.value === 'edit' || action.value === 'send')) {
                        const recipient = document.getElementById('recipient').value.trim();
                        const subject = document.getElementById('subject').value.trim();
                        const body = document.getElementById('body').value.trim();
                        
                        if (!recipient && action.value === 'send') {
                            e.preventDefault();
                            showToast('Please enter at least one recipient.', 'Validation Error', 'error');
                            document.getElementById('recipient').focus();
                            return;
                        }
                        
                        if (!subject) {
                            e.preventDefault();
                            showToast('Please enter a subject.', 'Validation Error', 'error');
                            document.getElementById('subject').focus();
                            return;
                        }
                        
                        if (!body) {
                            e.preventDefault();
                            showToast('Please enter a message.', 'Validation Error', 'error');
                            document.getElementById('body').focus();
                            return;
                        }
                    }
                });
            }
        });

        // Toast Notification System
        function showToast(message, title, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = `notification-toast ${type}`;
            
            const icons = {
                success: 'bi-check-circle',
                error: 'bi-x-circle',
                warning: 'bi-exclamation-triangle',
                info: 'bi-info-circle'
            };
            
            toast.innerHTML = `
                <i class="bi ${icons[type] || icons.success}"></i>
                <div style="flex:1;">
                    ${title ? `<strong>${title}</strong><br>` : ''}
                    <span>${message}</span>
                </div>
                <button class="dismiss-btn">&times;</button>
                <div class="progress-bar"></div>
            `;
            
            container.appendChild(toast);
            
            const dismissBtn = toast.querySelector('.dismiss-btn');
            dismissBtn.addEventListener('click', function() {
                toast.style.animation = 'slideOutRight 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            });
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.style.animation = 'slideOutRight 0.3s ease forwards';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 5000);
        }
    </script>
</body>
</html>
