{% extends "base.html" %}
{% block title %}Reset Password - TransferX{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card" data-aos="fade-up">
        <div class="auth-header">
            <i class="bi bi-key logo-icon"></i>
            <h1>Set New Password</h1>
            <p>Create a new password for your account</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="password">
                    <i class="bi bi-lock"></i> New Password
                </label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required
                           placeholder="Enter new password">
                    <button type="button" class="toggle-password" data-target="password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-level" data-strength="0"></div>
                    </div>
                    <span class="strength-text">Weak</span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">
                    <i class="bi bi-check-circle"></i> Confirm Password
                </label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_password" name="confirm_password" required
                           placeholder="Confirm new password">
                    <button type="button" class="toggle-password" data-target="confirm_password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn-primary btn-block">
                <i class="bi bi-check-circle"></i> Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
