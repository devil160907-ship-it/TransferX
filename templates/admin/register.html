{% extends "base.html" %}
{% block title %}Register - TransferX{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card" data-aos="fade-up">
        <div class="auth-header">
            <i class="bi bi-cloud-arrow-up-fill logo-icon"></i>
            <h1>Create Account</h1>
            <p>Join TransferX today</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="username">
                    <i class="bi bi-person"></i> Username
                </label>
                <input type="text" id="username" name="username" required
                       placeholder="Choose a username">
                <div class="validation-feedback" data-field="username"></div>
            </div>
            
            <div class="form-group">
                <label for="email">
                    <i class="bi bi-envelope"></i> Email
                </label>
                <input type="email" id="email" name="email" required
                       placeholder="Enter your email">
                <div class="validation-feedback" data-field="email"></div>
            </div>
            
            <div class="form-group">
                <label for="full_name">
                    <i class="bi bi-person-badge"></i> Full Name
                </label>
                <input type="text" id="full_name" name="full_name"
                       placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class="bi bi-lock"></i> Password
                </label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required
                           placeholder="Create a password">
                    <button type="button" class="toggle-password" data-target="password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-level" data-strength="0"></div>
                    </div>
                    <span class="strength-text">Weak</span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">
                    <i class="bi bi-check-circle"></i> Confirm Password
                </label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_password" name="confirm_password" required
                           placeholder="Confirm your password">
                    <button type="button" class="toggle-password" data-target="confirm_password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn-primary btn-block">
                <i class="bi bi-person-plus"></i> Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
