{% extends "base.html" %}
{% block title %}Forgot Password - TransferX{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card" data-aos="fade-up">
        <div class="auth-header">
            <i class="bi bi-key logo-icon"></i>
            <h1>Reset Password</h1>
            <p>We'll send you a link to reset your password</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="email">
                    <i class="bi bi-envelope"></i> Email Address
                </label>
                <input type="email" id="email" name="email" required
                       placeholder="Enter your registered email">
            </div>
            
            <button type="submit" class="btn-primary btn-block">
                <i class="bi bi-send"></i> Send Reset Link
            </button>
        </form>
        
        <div class="auth-footer">
            <p><a href="{{ url_for('auth.login') }}"><i class="bi bi-arrow-left"></i> Back to Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
